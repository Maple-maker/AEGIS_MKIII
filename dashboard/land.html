<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AEGIS — Command Intelligence System</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#00060F; --bg2:#000B1A; --border:#0D3A6E; --bh:#1565C0;
  --cyan:#00E5FF; --cyan-d:#29B6F6; --blue:#1976D2; --blue-l:#42A5F5;
  --text:#90CAF9; --text-b:#E3F2FD; --text-d:#546E7A; --green:#00E676;
  --mono:'JetBrains Mono',monospace; --orb:'Orbitron',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100vh;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--mono);font-size:13px;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(21,101,192,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(21,101,192,0.06) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;
}
body::after{
  content:"";position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,6,15,0.8) 100%);
  pointer-events:none;
}

#card{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:0;text-align:center;
  padding:56px 64px;
  border:1px solid var(--border);
  background:rgba(0,14,36,0.85);
  backdrop-filter:blur(12px);
  box-shadow:0 0 80px rgba(21,101,192,0.15),inset 0 0 60px rgba(0,0,0,0.3);
  max-width:520px;width:100%;
}

/* Decorative corner marks */
#card::before,#card::after{
  content:"";position:absolute;
  width:20px;height:20px;
  border-color:var(--cyan);border-style:solid;
}
#card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
#card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

.logo-text{
  font-family:var(--orb);font-size:48px;font-weight:900;letter-spacing:8px;
  color:var(--cyan);text-shadow:0 0 40px rgba(0,229,255,0.5);
  line-height:1;
}
.logo-sub{
  font-size:9px;letter-spacing:3px;color:var(--text-d);margin-top:10px;
}
.divider{
  width:100%;height:1px;background:var(--border);margin:32px 0;
}
.tagline{
  font-family:var(--orb);font-size:13px;letter-spacing:1.5px;
  color:var(--text-b);line-height:1.6;max-width:340px;
}
.tagline-sub{
  font-size:10px;color:var(--text-d);letter-spacing:1px;
  line-height:1.7;margin-top:12px;max-width:360px;
}

.cta-group{display:flex;flex-direction:column;gap:12px;width:100%;margin-top:36px}

.btn-primary{
  padding:16px 32px;width:100%;
  font-family:var(--orb);font-size:12px;font-weight:700;letter-spacing:3px;
  color:#000;background:var(--cyan);border:none;border-radius:3px;
  cursor:pointer;
  box-shadow:0 0 30px rgba(0,229,255,0.35);
  transition:all 200ms;
}
.btn-primary:hover{
  background:#fff;box-shadow:0 0 50px rgba(0,229,255,0.6);
  transform:translateY(-1px);
}

.btn-secondary{
  padding:13px 32px;width:100%;
  font-family:var(--orb);font-size:11px;font-weight:500;letter-spacing:2px;
  color:var(--cyan-d);
  background:transparent;
  border:1px solid var(--bh);border-radius:3px;
  cursor:pointer;transition:all 150ms;
}
.btn-secondary:hover{
  border-color:var(--cyan);color:var(--cyan);
  background:rgba(0,229,255,0.05);
}

.link-row{
  display:flex;justify-content:center;gap:20px;
  margin-top:28px;
  font-size:9px;letter-spacing:1.5px;color:var(--text-d);
}
.link-row a{color:var(--text-d);text-decoration:none;transition:color 120ms}
.link-row a:hover{color:var(--cyan-d)}
.link-row span{color:var(--border)}

.status-row{
  display:flex;gap:16px;margin-top:28px;
}
.status-dot{
  display:flex;align-items:center;gap:5px;
  font-size:8px;letter-spacing:1.5px;color:var(--text-d);
}
.dot{width:6px;height:6px;border-radius:50%;animation:blink 2s ease infinite}
.dot-on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-off{background:var(--text-d);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Orbit ring decoration behind the logo */
.orbit{
  width:160px;height:160px;border-radius:50%;
  border:1px dashed rgba(21,101,192,0.3);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;position:relative;
  animation:spin 30s linear infinite;
}
.orbit::before{
  content:"";position:absolute;
  width:180px;height:180px;border-radius:50%;
  border:1px dashed rgba(21,101,192,0.15);
  animation:spin 50s linear infinite reverse;
}
.orbit-inner{
  width:120px;height:120px;border-radius:50%;
  border:1px solid rgba(0,229,255,0.15);
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle,rgba(0,229,255,0.08) 0%,transparent 70%);
  animation:spin 30s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="card">

  <div class="orbit">
    <div class="orbit-inner">
      <div class="logo-text">⬡</div>
    </div>
  </div>

  <div class="logo-text">AEGIS</div>
  <div class="logo-sub">ADAPTIVE EXECUTIVE GUARDIAN INTELLIGENCE SYSTEM</div>

  <div class="divider"></div>

  <div class="tagline">Your personal command intelligence system.</div>
  <div class="tagline-sub">Voice-activated AI that tracks your wealth, habits, knowledge, and goals — all in one mission-critical dashboard.</div>

  <div class="cta-group">
    <button class="btn-primary" onclick="location.href='/hud'">⬡ &nbsp;OPEN DASHBOARD</button>
    <button class="btn-secondary" onclick="location.href='/onboard'">FIRST TIME? INITIALIZE AEGIS →</button>
  </div>

  <div class="status-row">
    <div class="status-dot"><div class="dot dot-on" id="dot-sys"></div>SYSTEM</div>
    <div class="status-dot"><div class="dot" id="dot-mkt"></div>MARKET</div>
    <div class="status-dot"><div class="dot" id="dot-vault"></div>VAULT</div>
    <div class="status-dot"><div class="dot dot-off" id="dot-voice"></div>VOICE</div>
  </div>

  <div class="link-row">
    <a href="/settings">SETTINGS</a>
    <span>·</span>
    <a href="/onboard">SETUP</a>
    <span>·</span>
    <a href="/hud">HUD</a>
  </div>

</div>
<script>
async function checkStatus() {
  try {
    const r = await fetch('/api/portfolio');
    document.getElementById('dot-mkt').className = r.ok ? 'dot dot-on' : 'dot dot-off';
  } catch { document.getElementById('dot-mkt').className = 'dot dot-off'; }
  try {
    const r = await fetch('/api/vault/graph');
    const d = await r.json();
    document.getElementById('dot-vault').className = d.ok ? 'dot dot-on' : 'dot dot-off';
  } catch { document.getElementById('dot-vault').className = 'dot dot-off'; }
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    if (d.ok && d.config?.ai?.voice) {
      document.getElementById('dot-voice').className = 'dot dot-on';
    }
  } catch {}
}
checkStatus();
</script>
</body>
</html>
